name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "webkit2gtk version to build in pkgver-pkgrel format (e.g. 2.46.5-2)"
        required: true
        type: string

jobs:
  build:
    runs-on: blacksmith-32vcpu-ubuntu-2404
    container:
      image: archlinux:latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Check for existing release
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_NAME: ${{ github.repository }}
        run: bash scripts/check-release.sh "${{ inputs.version }}"

      - name: Build webkit2gtk package
        id: build
        if: steps.check_release.outputs.release_exists != 'true'
        run: bash scripts/build-package.sh

      - name: Create GitHub release and upload artifact
        id: release
        if: steps.check_release.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/create-release.sh \
            "${{ inputs.version }}" \
            "${{ steps.build.outputs.pkg_path }}"

      - name: Update webkit2gtk-bin AUR package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.check_release.outputs.release_exists }}" = "true" ]; then
            PKG_PATH="${{ steps.check_release.outputs.pkg_path }}"
            ASSET_URL="${{ steps.check_release.outputs.asset_url }}"
          else
            PKG_PATH="${{ steps.build.outputs.pkg_path }}"
            ASSET_URL="${{ steps.release.outputs.asset_url }}"
          fi
          bash scripts/update-aur.sh \
            "${{ inputs.version }}" \
            "$PKG_PATH" \
            "$ASSET_URL"
